name: kpss_haritasi
description: "KPSS Türkiye Harita Quiz Uygulaması"

publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  collection: ^1.19.1
  shared_preferences: ^2.5.4
  audioplayers: ^6.6.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  google_sign_in: 6.2.1
  google_mobile_ads: ^7.0.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  color: "#0F172A"
  image: assets/splash_icon.png
  android: true
  ios: true
  android_12:
    color: "#0F172A"
    image: assets/splash_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/splash_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/tr-cities.json
    - assets/sounds/